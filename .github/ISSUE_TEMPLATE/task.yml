name: Task
description: A specific piece of work — chore, refactor, infra, docs, sweep
title: "[task] "
labels: ["enhancement"]
type: Task
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What this task accomplishes and why.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist of what "done" looks like.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art, related issues.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues to avoid duplicates.
          required: true
