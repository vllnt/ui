# ui — vllnt-cluster build pipeline.
# Matrix builds both ui-registry (root Dockerfile) and storybook
# (apps/storybook/Dockerfile) in parallel, each pushed to its own
# OVH registry repo + deployed via the cluster deployer API.

name: build

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-sign-scan-deploy:
    name: build · sign · scan · deploy (${{ matrix.service }})
    runs-on: vllnt-cluster
    timeout-minutes: 25
    permissions:
      contents: read
      checks: write
      deployments: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ui-registry
            dockerfile: Dockerfile
          - service: storybook
            dockerfile: apps/storybook/Dockerfile
    env:
      IMAGE_BASE: "${{ vars.REGISTRY_HOST }}/vllnt/${{ matrix.service }}"
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - id: tag
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}-$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
            echo "sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
            echo "env=preview" >> $GITHUB_OUTPUT
          else
            echo "tag=main-$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "env=production" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://buildkit.buildkit:1234

      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: "${{ env.IMAGE_BASE }}:${{ steps.tag.outputs.tag }}"
          provenance: false

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_BASE }}@${{ steps.build.outputs.digest }}
          severity: CRITICAL
          exit-code: '0'
          ignore-unfixed: true
          format: table

      - uses: sigstore/cosign-installer@v3.7.0
        with: { cosign-release: 'v2.4.1' }

      - name: Cosign sign
        env:
          COSIGN_KEY:      ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "$COSIGN_KEY" > /tmp/cosign.key
          cosign sign --key /tmp/cosign.key --yes \
            ${{ env.IMAGE_BASE }}@${{ steps.build.outputs.digest }}
          shred -u /tmp/cosign.key

      - name: Deploy via vllnt deployer
        uses: vllnt/deploy-action@v1
        env:
          DEPLOYER_API_BEARER: ${{ secrets.DEPLOYER_API_BEARER }}
        with:
          service:   ${{ matrix.service }}
          env:       ${{ steps.tag.outputs.env }}
          sha:       ${{ steps.tag.outputs.sha }}
          digest:    ${{ steps.build.outputs.digest }}
          pr_number: ${{ github.event.pull_request.number }}
          agent_id:  ${{ github.actor }}
          deployer_url: http://deployer.vllnt-platform:80
