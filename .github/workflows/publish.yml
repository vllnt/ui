name: Publish

on:
  push:
    branches: [main]
    paths:
      - "packages/ui/**"
      - "CHANGELOG.md"
      - "cliff.toml"
      - "pnpm-lock.yaml"
      - ".github/workflows/publish.yml"
  workflow_dispatch: {}

concurrency:
  group: publish-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -F @vllnt/ui lint

      - name: Typecheck
        run: pnpm -F @vllnt/ui exec tsc --noEmit --project tsconfig.build.json

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test:once

  canary:
    name: Publish Canary
    needs: quality
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish canary
        working-directory: packages/ui
        run: |
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
          unset NODE_AUTH_TOKEN
          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          CANARY_VERSION="${BASE_VERSION}-canary.${SHORT_SHA}"
          npm version "$CANARY_VERSION" --no-git-tag-version
          TARBALL=$(pnpm pack --pack-destination /tmp | tail -1)
          npm install -g npm@latest
          npm publish "$TARBALL" --tag canary --provenance --access public

  release:
    name: Publish Release
    needs: quality
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Read version + guard against retag
        id: version
        working-directory: packages/ui
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git -C "$GITHUB_WORKSPACE" rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists on this repo. Bump packages/ui/package.json on main via a PR before dispatching."
            exit 1
          fi

      - name: Read changelog release notes
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          awk -v version="$VERSION" '
            /^## / {
              if (capture) exit
              if ($0 ~ "^## \\[?" version "\\]?") {
                capture = 1
                next
              }
            }
            capture { print }
          ' CHANGELOG.md > /tmp/release-notes.md

          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::CHANGELOG.md must include a ${VERSION} release section before dispatch."
            exit 1
          fi

          {
            echo "body<<CHANGELOG_EOF"
            cat /tmp/release-notes.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Confirm changelog entry exists
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if ! grep -Eq "^## \\[?${VERSION}\\]?|^## \\[?v${VERSION}\\]?" CHANGELOG.md packages/ui/CHANGELOG.md; then
            echo "::error::CHANGELOG.md or packages/ui/CHANGELOG.md must include a ${VERSION} release section before dispatch."
            exit 1
          fi

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Publish to npm
        working-directory: packages/ui
        run: |
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
          unset NODE_AUTH_TOKEN
          TARBALL=$(pnpm pack --pack-destination /tmp | tail -1)
          npm install -g npm@latest
          npm publish "$TARBALL" --tag latest --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md
