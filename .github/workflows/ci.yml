name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -F @vllnt/ui lint

      - name: Typecheck
        run: pnpm -F @vllnt/ui exec tsc --noEmit --project tsconfig.build.json

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test:once

      - name: Check "use client" directives
        run: pnpm -F @vllnt/ui check:use-client

      - name: Verify stories
        working-directory: packages/ui
        run: |
          npx tsx scripts/check-story-coverage.ts
          npx tsx scripts/verify-stories.ts

      - name: Build Storybook
        working-directory: packages/ui
        run: pnpm build-storybook
