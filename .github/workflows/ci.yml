name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -F @vllnt/ui lint

      - name: Lint registry
        run: pnpm -F @vllnt/ui-registry lint

      - name: Typecheck
        run: pnpm -F @vllnt/ui exec tsc --noEmit --project tsconfig.build.json

      - name: Build
        run: pnpm build

      - name: Check registry drift
        run: pnpm -F @vllnt/ui-registry registry:check

      - name: Check registry integrity
        run: pnpm -F @vllnt/ui-registry registry:integrity

      - name: Test
        run: pnpm test:once

      - name: Check "use client" directives
        run: pnpm -F @vllnt/ui check:use-client

      - name: Verify stories
        working-directory: packages/ui
        run: |
          npx tsx scripts/check-story-coverage.ts
          npx tsx scripts/verify-stories.ts

      - name: Build Storybook
        working-directory: packages/ui
        run: pnpm build-storybook

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm -F @vllnt/ui-registry exec playwright install --with-deps chromium

      - name: Generate registry artifacts
        run: pnpm -F @vllnt/ui-registry registry:build

      - name: Run E2E tests
        run: pnpm -F @vllnt/ui-registry test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/registry/playwright-report
          retention-days: 7
