name: react-doctor

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: react-doctor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan codebase health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: react-doctor (PR diff)
        if: github.event_name == 'pull_request'
        run: |
          npx --yes react-doctor . \
            --diff origin/${{ github.base_ref }} \
            --annotations \
            --fail-on error \
            --offline

      - name: react-doctor (full scan on main)
        if: github.event_name == 'push'
        run: |
          npx --yes react-doctor . \
            --json \
            --offline > rd-report.json
          jq '.summary' rd-report.json

      - name: Upload report
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: react-doctor-report
          path: rd-report.json
          retention-days: 30
