server {
    listen       8080 default_server;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    if ($host = storybook.vllnt.ai) {
        return 301 https://storybook.vllnt.com$request_uri;
    }

    # Healthcheck endpoint for K8s probes
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Keep Storybook out of search indexes — the canonical component docs live
    # at ui.vllnt.com/components/*. Indexing storybook.vllnt.ai cannibalizes them.
    location = /robots.txt {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    # Static asset caching — long TTL on hashed files, none on HTML
    location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        # Storybook generates fully-static HTML; no fallback needed
        try_files $uri $uri/index.html =404;

        # Security headers (defense in depth — Traefik middleware also adds these)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Do not index Storybook — canonical docs are on ui.vllnt.com/components/*
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
